services:

  # =========================================================
  # POSTGRES
  # =========================================================

  db:
    image: postgres:16.4

    container_name: resume_builder_db

    restart: unless-stopped

    env_file:
      - .env

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: [
        "CMD-SHELL",
        "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
      ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # =========================================================
  # REDIS
  # =========================================================

  redis:
    image: redis:7-alpine

    container_name: resume_builder_redis

    restart: unless-stopped

    env_file:
      - .env

    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}

    ports:
      - "6379:6379"

    healthcheck:
      test: [
        "CMD",
        "redis-cli",
        "-a",
        "${REDIS_PASSWORD}",
        "ping"
      ]
      interval: 10s
      timeout: 5s
      retries: 5

# =========================================================
# VOLUMES
# =========================================================

volumes:
  postgres_data:
