services:
  db:
    image: postgres:16.4
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.docker}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.docker}
    command: ["sh", "-c", "exec redis-server --requirepass \"$$REDIS_PASSWORD\""]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["app"]
    restart: "no"
    env_file:
      - ${ENV_FILE:-.env.docker}
    command: ["alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["app"]
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.docker}
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["app"]
    restart: unless-stopped
    init: true
    env_file:
      - ${ENV_FILE:-.env.docker}
    command: ["celery", "-A", "app.tasks.worker", "worker", "--loglevel=info"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

volumes:
  postgres_data:
  redis_data:
