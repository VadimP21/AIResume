name: Backend quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: airesume_test
          POSTGRES_USER: airesume
          POSTGRES_PASSWORD: airesume
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U airesume -d airesume_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: airesume_test
      POSTGRES_USER: airesume
      POSTGRES_PASSWORD: airesume
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      JWT_SECRET: test-secret-at-least-32-characters
      TEST_DATABASE_URL: postgresql+asyncpg://airesume:airesume@localhost:5432/airesume_test
      TEST_REDIS_URL: redis://localhost:6379/15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-groups
      - run: uv run alembic upgrade head
      - run: uv run alembic downgrade -1
      - run: uv run alembic upgrade head
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy app
      - run: uv run pytest
