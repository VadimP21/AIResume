name: Docker

on:
  pull_request:
    paths:
      - "Dockerfile"
      - "docker-compose.yaml"
      - ".dockerignore"
      - ".env.docker.example"
      - "pyproject.toml"
      - "uv.lock"
      - "app/**"
      - "alembic/**"
      - "static/**"
      - ".github/workflows/docker.yml"
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "docker-compose.yaml"
      - ".dockerignore"
      - ".env.docker.example"
      - "pyproject.toml"
      - "uv.lock"
      - "app/**"
      - "alembic/**"
      - "static/**"
      - ".github/workflows/docker.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose configuration
        run: ENV_FILE=.env.docker.example docker compose --profile app config --quiet
      - name: Build application image
        run: docker build --tag airesume-backend:ci .
