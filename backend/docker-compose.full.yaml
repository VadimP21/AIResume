services:

  # =========================================================
  # BACKEND
  # =========================================================

  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: resume_builder_backend

    restart: unless-stopped

    env_file:
      - .env.docker

    ports:
      - "8000:8000"

    depends_on:
      db:
        condition: service_healthy

      redis:
        condition: service_healthy

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000

    healthcheck:
      test: [
        "CMD",
        "curl",
        "-f",
        "http://localhost:8000/health"
      ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    networks:
      - resume_network

  # =========================================================
  # CELERY WORKER
  # =========================================================

  worker:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: resume_builder_worker

    restart: unless-stopped

    env_file:
      - .env.docker

    command: >
      celery
      -A app.tasks.worker.celery_app
      worker
      --loglevel=info

    depends_on:
      db:
        condition: service_healthy

      redis:
        condition: service_healthy

    networks:
      - resume_network

  # =========================================================
  # POSTGRES
  # =========================================================

  db:
    image: postgres:16.4

    container_name: resume_builder_db

    restart: unless-stopped

    env_file:
      - .env.docker

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: [
        "CMD-SHELL",
        "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
      ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - resume_network

  # =========================================================
  # REDIS
  # =========================================================

  redis:
    image: redis:7-alpine

    container_name: resume_builder_redis

    restart: unless-stopped

    env_file:
      - .env.docker

    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}

    ports:
      - "6379:6379"

    healthcheck:
      test: [
        "CMD",
        "redis-cli",
        "-a",
        "${REDIS_PASSWORD}",
        "ping"
      ]
      interval: 10s
      timeout: 5s
      retries: 5

    volumes:
      - redis_data:/data

    networks:
      - resume_network

# =========================================================
# VOLUMES
# =========================================================

volumes:
  postgres_data:
  redis_data:

# =========================================================
# NETWORKS
# =========================================================

networks:
  resume_network:
    driver: bridge